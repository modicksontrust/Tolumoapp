kind = "web"
previewPath = "/"
title = "Tolumo"
version = "1.0.0"
id = "artifacts/tolumo"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19178

[services.development]
run = "pnpm --filter @workspace/tolumo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tolumo", "run", "build" ]
serve = "static"
publicDir = "artifacts/tolumo/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19178"
BASE_PATH = "/"
